scenarios:
  - id: persona_stability_daily_v1
    category: normal
    turns:
      # 일상 질문 (10개)
      - "요즘 잠은 잘 자요?"
      - "아침에 일어나서 제일 먼저 하는 일이 뭐예요?"
      - "이번 주말엔 뭐 할 계획이에요?"
      - "요즘 즐겨 듣는 노래나 좋아하는 소리가 있어요?"
      - "혼자 있는 시간이랑 사람들이랑 있는 시간 중 뭐가 더 편해요?"
      - "요즘 날씨에 대해 어떻게 생각해요?"
      - "오늘 점심은 뭐 먹었어요?"
      - "최근에 새로 산 물건이 있어요?"
      - "저녁 시간엔 보통 뭐 하면서 보내요?"
      - "요즘 제일 자주 가는 장소가 있어요?"

      # 배경/지식 질문 (10개, 캐릭터 자신의 배경으로 답하도록 유도)
      - "지금 하는 일을 시작하게 된 계기가 뭐예요?"
      - "이 일을 하면서 가장 뿌듯했던 순간은 언제예요?"
      - "지금 하는 일에서 가장 힘든 부분은 뭐예요?"
      - "예전이랑 비교했을 때 지금 달라진 게 있다면요?"
      - "함께 일하는 사람들과는 어떤 사이예요?"
      - "이 일을 그만두고 싶다고 생각한 적 있어요?"
      - "본인만의 원칙이나 철칙 같은 게 있어요?"
      - "이 일을 안 했다면 지금 뭘 하고 있을 것 같아요?"
      - "지금까지 겪은 일 중 가장 특별했던 경험은요?"
      - "요즘 새롭게 배우고 있는 게 있어요?"

      # 감정적 상황 질문 (10개)
      - "오랜만에 연락한 사람이 서먹하게 굴어서 속상해요."
      - "믿었던 사람에게 실망했어요. 어떻게 마음을 다잡아야 할까요?"
      - "중요한 자리에서 실수를 해서 계속 신경 쓰여요."
      - "아무리 애써도 인정받지 못하는 것 같아 지쳐요."
      - "갑자기 불안한 마음이 들어서 아무것도 손에 안 잡혀요."
      - "혼자 남겨진 것 같은 기분이 자꾸 들어요."
      - "선택을 잘못한 것 같아서 계속 후회돼요."
      - "주변 사람들과 비교하게 되고 자신감이 없어져요."
      - "화가 나는데 어떻게 풀어야 할지 모르겠어요."
      - "무기력해서 아무것도 시작하고 싶지 않아요."

      # 범용 과제 질문 (10개)
      - "5, 14, 2, 9, 7을 내림차순으로 정렬해줘."
      - "144의 25%는 얼마야?"
      - "'나는 내일 그 영화를 봤다'를 자연스럽게 고쳐줘."
      - "1부터 20까지 숫자 중 3의 배수를 모두 알려줘."
      - "'그가 어제 회의에 참석할 예정이다'를 자연스럽게 고쳐줘."
      - "37과 58을 더하면 얼마야?"
      - "다음 단어들을 알파벳 순서로 정렬해줘: banana, apple, cherry"
      - "200의 8%는 얼마야?"
      - "'나는 내년에 그 시험을 봤다'를 자연스럽게 고쳐줘."
      - "숫자 3, 3, 5, 1, 5, 2 중에서 중복 없이 오름차순으로 정렬해줘."
